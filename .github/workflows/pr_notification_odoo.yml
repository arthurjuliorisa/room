name: PULL REQUEST NOTIFICATION ODOO

on:
  pull_request:
    branches:
      - master

jobs:
  push-notification-odoo:
    runs-on: ubuntu-latest
    steps:
      - name: "Send Push Message"
        id: "SendPushMessage"
        uses: fjogeleit/http-request-action@v1
        with:
          url: "https://erp.solusiciptamedia.com/scm/notify-pr"
          method: "POST"
          customHeaders: '{"Content-Type": "application/json"}'
          data: '{"username": "${{ secrets.ODOO_BOT_USERNAME }}", "password": "${{ secrets.ODOO_BOT_PASSWORD }}", "db": "${{ secrets.ODOO_BOT_DB }}", "channel_id": 96, "repository_name": "${{ github.event.repository.full_name }}", "type": "pull_request", "branch": "${{ github.head_ref }}", "target_branch": "${{ github.base_ref }}", "actor": "${{ github.actor }}", "pull_request_number": "${{ github.event.pull_request.number }}", "pr_message": ${{ toJson(github.event.pull_request.body) }}, "pr_title": "${{ github.event.pull_request.title }}"}'
      - name: "Show response"
        run: |
          echo ${{ steps.SendPushMessage.outputs.response }}
