name: Deployment

on:
  push:
    branches: ["master"]

jobs:
  ci-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Use Node.js 18.x
        uses: actions/setup-node@v3
        with:
          node-version: 18.x
          cache: "npm"
      - run: npm install
      - name: Build app with .env
        run: |
          echo APP_MODE=dev >> .env
          echo PM2_PORT=${{ secrets.PM2_PORT_DEV }} >> .env
          echo NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL_DEV }} >> .env
          echo JWT_SECRET=${{ secrets.JWT_SECRET_DEV }} >> .env
          echo DATABASE_URL=${{ secrets.DATABASE_URL_DEV }} >> .env
          npm run build
      - name: copy file to server
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          port: ${{ secrets.PORT }}
          password: ${{ secrets.PASSWORD }}
          source: "./.next/./"
          target: "/home/next.appsens.id/tempdir"
      - name: copy package-lock.json to server
        uses: appleboy/scp-action@v0.1.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          port: ${{ secrets.PORT }}
          password: ${{ secrets.PASSWORD }}
          source: "package-lock.json"
          target: "/home/next.appsens.id"
  rebase-install:
    runs-on: ubuntu-latest
    needs: ci-build
    steps:
      - name: setup ssh
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{secrets.HOST}}
          username: ${{secrets.USERNAME}}
          password: ${{secrets.PASSWORD}}
          port: ${{secrets.PORT}}
          script: |
            cd /home/next.appsens.id/nextjs-vuexy-kit
            rm -r .next
            mv /home/next.appsens.id/tempdir/.next /home/next.appsens.id/nextjs-vuexy-kit
            cd /home/next.appsens.id/nextjs-vuexy-kit
            git checkout master
            git pull
            rm package-lock.json
            PATH=/root/.nvm/versions/node/v18.20.3/bin:$PATH
            npm install
            npx prisma migrate deploy
            npx prisma generate
            npx prisma db seed -- --mode="dummy"
            pm2 restart nextjs-vuexy-kit
            exit
  move-package-lock:
    runs-on: ubuntu-latest
    needs: rebase-install
    steps:
      - name: setup ssh
        uses: appleboy/ssh-action@v0.1.5
        with:
          host: ${{secrets.HOST}}
          username: ${{secrets.USERNAME}}
          password: ${{secrets.PASSWORD}}
          port: ${{secrets.PORT}}
          script: |
            cd /home/next.appsens.id/nextjs-vuexy-kit
            rm package-lock.json
            cd /home/next.appsens.id
            mv package-lock.json /home/next.appsens.id/nextjs-vuexy-kit
